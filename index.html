<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="enter yout city name" spellcheck="false">
            <button><img src="search.png"></button>
        </div>
        <div class="error">
            <p>Invalid city name</p>
        </div>
        <div class="wheather">
            <img src="rain.png" class="wheather-icon">
            <h1 class="temp"> 22°C </h1>
            <h2 class="city">New Delhi</h2>
            <div class="details">
                <div class="col">
                    <img src="humidity.png">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="wind.png">
                    <div>
                        <p class="wind">15 Km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const apiKey = "6f4f5e7a203bab4c3d58f54eb0fa57f5";
        const apiURL = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";
        const searchBox = document.querySelector(".search input");
        const searchButton = document.querySelector(".search button")
        const wheatherIcon = document.querySelector(".wheather-icon")

        async function checkWheather(city) {
            const response = await fetch(apiURL + city + `&appid=${apiKey}`);
            if (response.status === 404) {
                document.querySelector(".error").style.display = "block";
                document.querySelector(".wheather").style.display = "none";
            } else {
                var data = await response.json();
                console.log(data);
                document.querySelector(".city").innerHTML = data.name;
                document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°C";
                document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
                const windKmh = (data.wind.speed * 3.6).toFixed(1);
                document.querySelector(".wind").innerHTML = windKmh + " Km/hr";

                if (data.weather[0].main == "Clouds") {
                    wheatherIcon.src = "clouds.png";
                } else if (data.weather[0].main == "Clear") {
                    wheatherIcon.src = "clear.png";
                } else if (data.weather[0].main == "Rain") {
                    wheatherIcon.src = "rain.png";
                } else if (data.weather[0].main == "Drizzle") {
                    wheatherIcon.src = "drizzle.png";
                } else if (data.weather[0].main == "Mist") {
                    wheatherIcon.src = "mist.png";
                }
                document.querySelector(".wheather").style.display = "block"
                document.querySelector(".error").style.display = "none"
            }
        }
        searchBox.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                checkWheather(searchBox.value);
            }
        });
        searchButton.addEventListener("click", () => {
            checkWheather(searchBox.value);
        })

        checkWheather();
    </script>

</body>

</html>
